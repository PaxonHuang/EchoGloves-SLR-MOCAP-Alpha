; PlatformIO Project Configuration File for Smart Glove ASL Translation
; ESP32-S3 DevKitC-1 Board Configuration
; Last Updated: 2026-02-28

[platformio]
default_envs = esp32-s3
src_dir = .

; ============================================================================
; ESP32-S3 Environment (Recommended for ML inference)
; ============================================================================
[env:esp32-s3]
platform = espressif32@6.3.0
board = esp32-s3-devkitc-1
framework = arduino

; Build settings
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio

; Partition scheme for large models
board_build.partitions = default_8MB.csv

; Library dependencies
lib_deps =
    ; MPU6050 IMU sensor driver
    adafruit/Adafruit MPU6050 @ ^2.2.0
    
    ; Unified sensor abstraction layer (required by Adafruit MPU6050)
    adafruit/Adafruit Unified Sensor @ ^1.1.6
    
    ; I2C bus communication utilities
    adafruit/Adafruit BusIO @ ^1.14.0

; Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Upload settings
upload_speed = 921600

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

; ============================================================================
; Standard ESP32 Environment (Alternative)
; ============================================================================
[env:esp32-devkit]
platform = espressif32@6.3.0
board = esp32dev
framework = arduino

; Build settings
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio

; Library dependencies (same as ESP32-S3)
lib_deps =
    adafruit/Adafruit MPU6050 @ ^2.2.0
    adafruit/Adafruit Unified Sensor @ ^1.1.6
    adafruit/Adafruit BusIO @ ^1.14.0

; Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Upload settings
upload_speed = 921600

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3

; ============================================================================
; Notes:
; ============================================================================
; 1. ESP32-S3 is recommended for better performance and more memory
; 2. FlexLibrary is not available in PlatformIO registry - must be installed manually
;    Download from: https://github.com/... and place in lib/ folder
; 3. For WiFi functionality, no additional libraries needed (built into ESP32 core)
; 4. Partition scheme may need adjustment based on model size
; ============================================================================
