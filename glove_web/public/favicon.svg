<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Glove body -->
  <rect x="16" y="20" width="32" height="38" rx="6" fill="#3b82f6" opacity="0.9"/>
  <!-- Thumb -->
  <rect x="6" y="30" width="14" height="8" rx="4" fill="#60a5fa" transform="rotate(-20 13 34)"/>
  <!-- Index finger -->
  <rect x="20" y="6" width="7" height="18" rx="3.5" fill="#60a5fa"/>
  <!-- Middle finger -->
  <rect x="28.5" y="3" width="7" height="22" rx="3.5" fill="#60a5fa"/>
  <!-- Ring finger -->
  <rect x="37" y="6" width="7" height="18" rx="3.5" fill="#60a5fa"/>
  <!-- Pinky -->
  <rect x="44.5" y="10" width="6" height="14" rx="3" fill="#60a5fa"/>
  <!-- Wrist strap -->
  <rect x="14" y="50" width="36" height="8" rx="4" fill="#1e40af" opacity="0.6"/>
  <!-- Sensor dots -->
  <circle cx="23.5" cy="14" r="1.5" fill="#fbbf24"/>
  <circle cx="32" cy="12" r="1.5" fill="#fbbf24"/>
  <circle cx="40.5" cy="14" r="1.5" fill="#fbbf24"/>
</svg>
