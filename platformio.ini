; PlatformIO Project Configuration File
; Edge AI Data Glove - ESP32-S3-DevKitC-1 N16R8
;
; Documentation: https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1-n8r8]
platform = espressif32 @ ^6.5.0
board = esp32-s3-devkitc-1-n8r8
framework = arduino

; Enable 16MB PSRAM (N16R8 version)
board_build.psram = enable
board_build.arduino.memory_type = qio_opi

; Serial monitor
monitor_speed = 115200

; Build flags
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17

; Library dependencies
lib_deps =
    nanopb/Nanopb @ ^0.4.7
    adafruit/Adafruit BNO08x @ ^1.2.5
    sparkfun/SparkFun TMAG5273 @ ^1.0.0
    adafruit/Adafruit BusIO @ ^1.14.1
    h2zero/NimBLE-Arduino @ ^1.4.1
    links2004/WebSockets @ ^2.4.1
    Wire

; NOTE: Edge Impulse exported library should be placed in lib/ directory
; e.g., lib/edge-impulse-inferencing/