; =============================================================================
; EdgeAI Data Glove V3 — PlatformIO Configuration
; =============================================================================
; MCU: ESP32-S3-DevKitC-1 N16R8 (dual-core 240 MHz, 16 MB Flash, 8 MB PSRAM)
; Framework: Arduino + ESP-IDF 5.x (via espressif32 platform)
; Purpose: Sign language data acquisition, L1 inference, WiFi/BLE telemetry
; =============================================================================

[env:esp32-s3-devkitc-1-n16r8]
platform      = espressif32@^6.5.0
board         = esp32-s3-devkitc-1
framework     = arduino

; ---- Board-specific: enable octal PSRAM (8 MB) ----
board_build.partitions = huge_app.csv
board_build.psram      = enable
board_build.f_flash    = 80000000L
board_build.flash_mode = qio

; ---- Build flags ----
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ASYNC_TCP_USE_WDT=0
    -DCONFIG_TCPIP_LWIP=1
    ; Optimize for speed & reduce PSRAM fragmentation
    -O2
    ; TFLite Micro needs PSRAM arena — define model buffer size (bytes)
    -DTFLITE_MODEL_ARENA_SIZE=512000
    ; Feature dimension: 15 hall + 6 IMU = 21
    -DFEATURE_COUNT=21
    ; Sliding window length for temporal models
    -DWINDOW_SIZE=30
    ; Number of gesture classes (ASL alphabet + extra)
    -DNUM_CLASSES=46
    ; Sensor sampling rate (Hz)
    -DSENSOR_RATE_HZ=100
    ; UDP telemetry port
    -DUDP_PORT=8888

; ---- Serial monitor ----
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; ---- Library dependencies ----
lib_deps =
    ; Nanopb — lightweight Protobuf for embedded (C)
    nanopb/Nanopb @ ^0.4.8
    ; Adafruit BNO08x — IMU via SH-2 interface (I2C)
    adafruit/Adafruit BNO08x @ ^1.2.3
    ; SparkFun TMAG5273 — 3D Hall-effect sensor driver
    sparkfun/SparkFun TMAG5273 Arduino Library @ ^1.0.3
    ; Adafruit BusIO — shared I2C/SPI abstraction
    adafruit/Adafruit BusIO @ ^1.14.3
    ; NimBLE-Arduino — BLE 5.0 stack (replaces Bluedroid)
    h2zero/NimBLE-Arduino @ ^1.4.2
    ; ArduinoJson — parsing model_config.yaml / SPIFFS config
    bblanchon/ArduinoJson @ ^7.0.4
    ; AsyncUDP — non-blocking UDP (built-in for ESP32-S3, but pin version)
    mathieucarbou/ESPAsyncUDP @ ^2.0.2
    ; TensorFlow Lite for Microcontrollers (ESP32-S3 optimized)
    tensorflow/tflite-micro-esp32 @ ^2.5.0

; ---- Extra source directories ----
lib_extra_dirs =
    lib

; ---- SPIFFS / LittleFS upload ----
board_build.filesystem = spiffs

; ---- Build warnings ----
build_unflags = -Werror

; =============================================================================
; Overridden monitors / debug
; =============================================================================
[env:esp32-s3-devkitc-1-n16r8_debug]
extends = env:esp32-s3-devkitc-1-n16r8
build_type = debug
build_flags =
    ${env:esp32-s3-devkitc-1-n16r8.build_flags}
    -DDEBUG_BUILD=1
    -DCORE_DEBUG_LEVEL=5
