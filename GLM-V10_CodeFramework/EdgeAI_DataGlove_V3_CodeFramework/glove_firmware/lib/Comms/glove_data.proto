syntax = "proto3";

/* =============================================================================
 * EdgeAI Data Glove V3 — Protobuf Wire Schema (Nanopb)
 * =============================================================================
 * Defines the serialized packet sent over UDP and BLE.
 *
 * Design Notes:
 *   - repeated fields use [packed=true] for space efficiency
 *   - float arrays are used (not nested messages) for zero-copy with TFLite
 *   - Status is a string for human readability; encoded as varint in wire format
 *   - timestamp is uint32 (wraps at ~4294 seconds ≈ 71 min; caller handles wrap)
 *
 * Nanopb Generation:
 *   protoc --nanopb_out=. lib/Comms/glove_data.proto
 *
 * V3 Change: Added l1_confidence and l2_requested fields for L1→L2 handoff.
 * =============================================================================
 */

package data_glove;

message GloveData {
    /// Monotonic timestamp in microseconds (mod 2^32)
    uint32 timestamp        = 1;

    /// 3D Hall sensor features: 15 floats (5 sensors × 3 axes XYZ)
    /// Order: [thumb_x, thumb_y, thumb_z, index_x, ..., pinky_z]
    repeated float hall_features    = 2 [packed = true];

    /// IMU features: 6 floats (3 euler + 3 gyro)
    /// Order: [roll, pitch, yaw, gyro_x, gyro_y, gyro_z]
    repeated float imu_features     = 3 [packed = true];

    /// Flex sensor features: 5 floats (reserved for V3.1)
    repeated float flex_features    = 4 [packed = true];

    /// L1 on-device gesture prediction (class index, 0-based)
    uint32 l1_gesture_id   = 5;

    /// L1 prediction confidence (0.0 – 1.0, softmax output)
    float l1_confidence    = 6;

    /// True if L2 (cloud/edge server) inference is requested for this frame
    bool l2_requested      = 7;

    /// System status string for debugging
    /// Values: "STREAMING" | "MODEL_SWITCHING" | "ERROR" | "CALIBRATING" | "IDLE"
    string status          = 8;
}

/* =============================================================================
 * Optional: Compact binary packet for ultra-low-latency mode
 * =============================================================================
 * When BLE bandwidth is limited, use this fixed-size message instead.
 * Total size: 4 + 15*4 + 6*4 + 5*4 + 4 + 4 + 1 = 118 bytes (vs protobuf ~130)
 * =============================================================================
message CompactGloveData {
    uint32  timestamp        = 1;
    float   hall_features    = 2;  // Encode as 15×4 = 60 bytes inline
    float   imu_features     = 3;  // Encode as 6×4 = 24 bytes inline
    float   flex_features    = 4;  // Encode as 5×4 = 20 bytes inline
    uint32  l1_gesture_id    = 5;
    float   l1_confidence    = 6;
    bool    l2_requested     = 7;
}
*/
